  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-family: 'Syne';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"5b57c239-c60f-4321-a5cc-d52b1dec7bf2\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"df0eae36-2ce5-46bf-a41b-dd15a7679a44\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a2568671-52d5-4f4d-9e21-0d88f98a5ee3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* ============================================================\n   SIDE · Color tokens\n   Dualidade: estrutura (gold) + fluidez (green), over ink & cream.\n   :root = LIGHT (cream premium). [data-theme=\"dark\"] = DARK (luxo).\n   ============================================================ */\n\n:root {\n  /* ---- Brand base palette (immutable) ---- */\n  --side-ink:        #1A1A1A;  /* near-black, primary ink (light) */\n  --side-black:      #080B14;  /* blue-black, dark canvas         */\n  --side-green:      #1F3D36;  /* deep forest — fluidez           */\n  --side-gold:       #C8A96A;  /* warm gold — estrutura           */\n  --side-cream:      #F7F4EF;  /* warm paper                      */\n  --side-cream-2:    #F5F0E8;  /* alt cream (dark-board paper)    */\n\n  /* ---- Ink ramp (warm neutral) ---- */\n  --ink-900: #0E0E0E;\n  --ink-800: #1A1A1A;\n  --ink-700: #2A2A28;\n  --ink-600: #3D3D39;\n  --ink-500: #57574F;\n  --ink-400: #7A796F;\n  --ink-300: #A3A199;\n  --ink-200: #C9C6BD;\n  --ink-100: #E4E1D8;\n  --ink-050: #F1EEE6;\n\n  /* ---- Green ramp (fluidez) ---- */\n  --green-900: #112620;\n  --green-800: #16302A;\n  --green-700: #1F3D36;\n  --green-600: #2A4E45;\n  --green-500: #3A6356;\n  --green-400: #5A8478;\n  --green-300: #8AACA2;\n  --green-200: #BCD2CB;\n  --green-100: #E2ECE8;\n\n  /* ---- Gold ramp (estrutura) ---- */\n  --gold-900: #8A7038;\n  --gold-800: #A98B4E;\n  --gold-700: #B8965A;\n  --gold-600: #C8A96A;  /* brand gold */\n  --gold-500: #D4B97F;\n  --gold-400: #DEC894;\n  --gold-300: #E8D9B8;\n  --gold-200: #F1E8D2;\n  --gold-100: #F8F2E6;\n\n  /* ---- Gold gradients (the gold is metallic, never flat) ---- */\n  --grad-gold:        linear-gradient(135deg, #E3CF9E 0%, #C8A96A 44%, #9C7C3C 100%); /* @kind color */\n  --grad-gold-soft:   linear-gradient(135deg, #DEC894 0%, #C8A96A 100%); /* @kind color */\n  --grad-gold-bright: linear-gradient(135deg, #F0E2BE 0%, #D4B97F 40%, #B8965A 100%); /* @kind color */\n  /* Dualidade sweep — estrutura (gold) flowing into fluidez (green) */\n  --grad-dualidade:   linear-gradient(135deg, #E3CF9E 0%, #C8A96A 28%, #6E8B6F 64%, #1F3D36 100%); /* @kind color */\n  --grad-aura:        radial-gradient(120% 120% at 18% 12%, rgba(200,169,106,.55) 0%, rgba(200,169,106,0) 42%), radial-gradient(130% 130% at 88% 78%, rgba(31,61,54,.85) 0%, rgba(31,61,54,0) 50%); /* @kind color */\n\n  /* ---- Blue-black canvas ramp (dark luxo) ---- */\n  --night-950: #050810;\n  --night-900: #080B14;\n  --night-850: #0C1019;\n  --night-800: #12161F;\n  --night-700: #1B2029;\n  --night-600: #262C36;\n  --night-500: #353C47;\n\n  /* ---- Cream / paper ramp ---- */\n  --paper-000: #FFFFFF;\n  --paper-050: #FBF9F5;\n  --paper-100: #F7F4EF;\n  --paper-200: #F1EDE4;\n  --paper-300: #E8E2D6;\n  --paper-400: #DAD3C4;\n\n  /* ---- Semantic status ---- */\n  --positive: #3A6356;   /* growth / on-track (green family) */\n  --positive-soft: #E2ECE8;\n  --attention: #B8965A;  /* gold caution */\n  --attention-soft: #F8F2E6;\n  --critical: #9B4A3F;   /* muted terracotta — never neon */\n  --critical-soft: #F3E6E2;\n  --info: #3F5A78;\n  --info-soft: #E6ECF3;\n\n  /* ============ LIGHT THEME (default) ============ */\n  --bg:            var(--paper-100);\n  --bg-sunken:     var(--paper-200);\n  --bg-raised:     var(--paper-050);\n  --surface:       var(--paper-000);\n  --surface-2:     var(--paper-050);\n  --surface-inset: var(--paper-200);\n\n  --text:          var(--ink-800);\n  --text-muted:    var(--ink-500);\n  --text-subtle:   var(--ink-400);\n  --text-inverse:  var(--side-cream-2);\n  --text-on-gold:  var(--ink-900);\n  --text-on-green: var(--side-cream-2);\n\n  --accent:        var(--side-gold);\n  --accent-strong: var(--gold-700);\n  --accent-ink:    var(--green-700);\n\n  --border:        var(--ink-100);\n  --border-strong: var(--ink-200);\n  --hairline:      rgba(26, 26, 26, 0.08);\n\n  --focus-ring:    var(--green-500);\n  --overlay:       rgba(14, 14, 14, 0.46);\n}\n\n/* ============ DARK THEME (luxo) ============ */\n[data-theme=\"dark\"] {\n  --bg:            var(--night-900);\n  --bg-sunken:     var(--night-950);\n  --bg-raised:     var(--night-850);\n  --surface:       var(--night-800);\n  --surface-2:     var(--night-700);\n  --surface-inset: var(--night-850);\n\n  --text:          var(--side-cream-2);\n  --text-muted:    #A9A498;\n  --text-subtle:   #6F6C62;\n  --text-inverse:  var(--ink-900);\n  --text-on-gold:  var(--ink-900);\n  --text-on-green: var(--side-cream-2);\n\n  --accent:        var(--side-gold);\n  --accent-strong: var(--gold-500);\n  --accent-ink:    var(--gold-600);\n\n  --border:        rgba(245, 240, 232, 0.10);\n  --border-strong: rgba(245, 240, 232, 0.18);\n  --hairline:      rgba(245, 240, 232, 0.07);\n\n  --focus-ring:    var(--gold-500);\n  --overlay:       rgba(5, 8, 16, 0.66);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SIDE · Typography tokens\n   Display/elegant = Cormorant (Canela). UI/precise = Hanken (Suisse).\n   Data = JetBrains Mono. Brand voice: wide-tracked caps for labels.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-serif:   'Syne', 'Schibsted Grotesk', system-ui, sans-serif;  /* kept alias; now the display sans */\n  --font-sans:    'Schibsted Grotesk', 'Suisse Int\\'l', system-ui, Arial, sans-serif;\n  --font-mono:    'Martian Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Semantic family aliases */\n  --font-display: 'Syne', 'Schibsted Grotesk', system-ui, sans-serif;   /* hero, headlines, big numbers */\n  --font-ui:      var(--font-sans);     /* product UI, body, labels     */\n  --font-data:    var(--font-mono);     /* metrics, timers, tables      */\n\n  /* ---- Type scale (1.250 major-third-ish, tuned) ---- */\n  --text-2xs:  11px;\n  --text-xs:   12px;\n  --text-sm:   13px;\n  --text-base: 15px;\n  --text-md:   17px;\n  --text-lg:   20px;\n  --text-xl:   24px;\n  --text-2xl:  30px;\n  --text-3xl:  38px;\n  --text-4xl:  48px;\n  --text-5xl:  62px;\n  --text-6xl:  82px;\n  --text-7xl:  110px;\n\n  /* ---- Weights ---- */\n  --fw-light:   300;  /* @kind other */\n  --fw-regular: 400;  /* @kind other */\n  --fw-medium:  500;  /* @kind other */\n  --fw-semibold:600;  /* @kind other */\n  --fw-bold:    700;  /* @kind other */\n  --fw-black:   800;  /* @kind other */\n\n  /* ---- Line heights ---- */\n  --lh-tight:   1.05;  /* @kind other */\n  --lh-snug:    1.18;  /* @kind other */\n  --lh-display: 1.08;  /* @kind other */\n  --lh-normal:  1.5;   /* @kind other */\n  --lh-relaxed: 1.65;  /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tighter: -0.03em;  /* @kind other */\n  --ls-tight:   -0.015em; /* @kind other */\n  --ls-normal:  0em;      /* @kind other */\n  --ls-wide:    0.08em;   /* @kind other */\n  --ls-wider:   0.18em;   /* @kind other */\n  --ls-widest:  0.34em;   /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SIDE · Spacing & layout tokens — 4px base, generous luxury rhythm\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-px:  1px;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-7:   32px;\n  --space-8:   40px;\n  --space-9:   48px;\n  --space-10:  64px;\n  --space-11:  80px;\n  --space-12:  104px;\n  --space-13:  136px;\n\n  /* Semantic */\n  --gutter:       var(--space-6);\n  --section-y:    var(--space-12);\n  --card-pad:     var(--space-6);\n  --field-pad-x:  var(--space-4);\n  --field-pad-y:  var(--space-3);\n\n  /* Layout widths */\n  --container:    1200px;\n  --container-wide: 1440px;\n  --measure:      66ch;\n  --sidebar-w:    264px;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SIDE · Radii — controlled curves. Sharp structure + soft fluidity.\n   The brand mixes hard angles (gold) with controlled curves (green):\n   small UI uses crisp 2–8px; pills/cabines use full rounding.\n   ============================================================ */\n\n:root {\n  --radius-0:   0;\n  --radius-xs:  2px;\n  --radius-sm:  4px;\n  --radius-md:  8px;\n  --radius-lg:  12px;\n  --radius-xl:  18px;\n  --radius-2xl: 26px;\n  --radius-3xl: 36px;\n  --radius-pill: 999px;\n\n  /* Semantic */\n  --radius-control: var(--radius-md);   /* buttons, inputs   */\n  --radius-card:    var(--radius-xl);    /* cards, panels     */\n  --radius-modal:   var(--radius-2xl);   /* dialogs, sheets   */\n  --radius-field:   var(--radius-md);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SIDE · Elevation & shadows\n   Light theme: soft warm-grey shadows (premium paper).\n   Dark theme: deep shadow + faint gold/inner light for luxe sheen.\n   ============================================================ */\n\n:root {\n  --shadow-xs:  0 1px 2px rgba(26, 26, 26, 0.06);\n  --shadow-sm:  0 2px 6px rgba(26, 26, 26, 0.07), 0 1px 2px rgba(26,26,26,0.05);\n  --shadow-md:  0 8px 24px -8px rgba(26, 26, 26, 0.14), 0 2px 6px rgba(26,26,26,0.06);\n  --shadow-lg:  0 20px 48px -16px rgba(26, 26, 26, 0.20), 0 4px 12px rgba(26,26,26,0.07);\n  --shadow-xl:  0 36px 80px -24px rgba(26, 26, 26, 0.26);\n\n  /* Gold focus glow (rare, for primary CTAs / brand moments) */\n  --glow-gold:  0 0 0 1px rgba(200,169,106,0.35), 0 8px 30px -8px rgba(200,169,106,0.45);\n  --ring:       0 0 0 3px color-mix(in srgb, var(--focus-ring) 35%, transparent);\n\n  /* Hairline insets used on dark surfaces */\n  --inset-hairline: inset 0 1px 0 rgba(245,240,232,0.05);\n}\n\n[data-theme=\"dark\"] {\n  --shadow-xs:  0 1px 2px rgba(0, 0, 0, 0.4);\n  --shadow-sm:  0 2px 8px rgba(0, 0, 0, 0.45);\n  --shadow-md:  0 10px 28px -8px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(245,240,232,0.04);\n  --shadow-lg:  0 24px 60px -18px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(245,240,232,0.05);\n  --shadow-xl:  0 44px 96px -28px rgba(0, 0, 0, 0.8);\n  --glow-gold:  0 0 0 1px rgba(200,169,106,0.30), 0 10px 40px -10px rgba(200,169,106,0.30);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SIDE · Motion — calm, controlled, premium. No bounce, no flash.\n   Easing favors confident ease-out; durations are unhurried.\n   ============================================================ */\n\n:root {\n  --dur-instant: 80ms;  /* @kind other */\n  --dur-fast:    150ms; /* @kind other */\n  --dur-base:    240ms; /* @kind other */\n  --dur-slow:    420ms; /* @kind other */\n  --dur-slower:  680ms; /* @kind other */\n\n  /* Confident, refined easing (no overshoot) */\n  --ease-out:     cubic-bezier(0.22, 0.61, 0.36, 1);  /* @kind other */\n  --ease-in-out:  cubic-bezier(0.65, 0.05, 0.36, 1);  /* @kind other */\n  --ease-emphatic:cubic-bezier(0.16, 1, 0.30, 1);  /* @kind other */\n  --ease-standard:cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n\n  --transition-control: color var(--dur-fast) var(--ease-out),\n                        background-color var(--dur-fast) var(--ease-out),\n                        border-color var(--dur-fast) var(--ease-out),\n                        box-shadow var(--dur-fast) var(--ease-out),\n                        transform var(--dur-fast) var(--ease-out); /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SIDE · Base reset & brand primitives\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-ui);\n  font-size: var(--text-base);\n  line-height: var(--lh-normal);\n  font-weight: var(--fw-regular);\n  color: var(--text);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  font-feature-settings: \"kern\" 1, \"liga\" 1;\n}\n\n::selection { background: color-mix(in srgb, var(--side-gold) 32%, transparent); color: var(--text); }\n\na { color: inherit; text-decoration: none; }\n\nh1,h2,h3,h4,h5,h6,p { margin: 0; }\n\n:focus-visible { outline: none; box-shadow: var(--ring); }\n\n/* ---- Brand text primitives ---- */\n.side-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-medium);\n  line-height: var(--lh-display);\n  letter-spacing: var(--ls-tight);\n}\n\n.side-eyebrow,\n.side-label {\n  font-family: var(--font-ui);\n  font-weight: var(--fw-semibold);\n  font-size: var(--text-2xs);\n  letter-spacing: var(--ls-wider);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n.side-wordmark {\n  font-family: var(--font-ui);\n  font-weight: var(--fw-regular);\n  letter-spacing: var(--ls-widest);\n  text-transform: uppercase;\n}\n\n/* Tabular numerals for any data context */\n.side-data { font-family: var(--font-data); font-feature-settings: \"tnum\" 1; }\n.tnum { font-variant-numeric: tabular-nums; }\n\n@keyframes side-spin { to { transform: rotate(360deg); } }\n@keyframes side-fade-in { from { opacity: 0; } to { opacity: 1; } }\n@keyframes side-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }\n\n/* Organic / fluid motion — the unexpected, dynamic side of SIDE */\n@keyframes side-morph {\n  0%, 100% { border-radius: 62% 38% 54% 46% / 56% 52% 48% 44%; }\n  33%      { border-radius: 38% 62% 40% 60% / 46% 38% 62% 54%; }\n  66%      { border-radius: 54% 46% 64% 36% / 38% 58% 42% 62%; }\n}\n@keyframes side-float {\n  0%, 100% { transform: translate3d(0,0,0) rotate(0deg); }\n  50%      { transform: translate3d(0,-14px,0) rotate(3deg); }\n}\n@keyframes side-aura-drift {\n  0%, 100% { transform: translate3d(0,0,0) scale(1); }\n  50%      { transform: translate3d(4%,-3%,0) scale(1.08); }\n}\n/* Mesh-gradient corner blobs — each drifts on its own path, anchored to a corner */\n@keyframes side-mesh-a {\n  0%,100% { transform: translate3d(0,0,0) scale(1); }\n  33%     { transform: translate3d(18%,12%,0) scale(1.14); }\n  66%     { transform: translate3d(8%,26%,0) scale(0.96); }\n}\n@keyframes side-mesh-b {\n  0%,100% { transform: translate3d(0,0,0) scale(1); }\n  40%     { transform: translate3d(-20%,-10%,0) scale(1.12); }\n  70%     { transform: translate3d(-8%,-24%,0) scale(0.95); }\n}\n@keyframes side-mesh-c {\n  0%,100% { transform: translate3d(0,0,0) scale(1); }\n  50%     { transform: translate3d(-22%,20%,0) scale(1.18); }\n}\n@keyframes side-mesh-d {\n  0%,100% { transform: translate3d(0,0,0) scale(1); }\n  50%     { transform: translate3d(24%,-18%,0) scale(1.1); }\n}\n@keyframes side-sheen {\n  0%   { background-position: 0% 50%; }\n  100% { background-position: 200% 50%; }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n<\u002Fstyle>\n\n<style>\n  html, body { margin: 0; padding: 0; background: #04060c; height: 100%; }\n  * { box-sizing: border-box; }\n  deck-stage:not(:defined) { visibility: hidden; }\n\n  /* ===================== brand foundations ===================== */\n  :root {\n    --c-ink: #04060c;\n    --c-night: #080B14;\n    --c-night2: #0C1019;\n    --c-gold: #C8A96A;\n    --c-gold-hi: #E6CE97;\n    --c-green: #1F3D36;\n    --c-green-lift: #2C5848;\n    --c-green-300: #8AACA2;\n    --c-cream: #F5F0E8;\n    --cream-90: rgba(245,240,232,.90);\n    --cream-70: rgba(245,240,232,.70);\n    --cream-55: rgba(245,240,232,.55);\n    --cream-40: rgba(245,240,232,.40);\n    --cream-28: rgba(245,240,232,.28);\n    --cream-14: rgba(245,240,232,.14);\n    --cream-08: rgba(245,240,232,.08);\n    --grad-gold: linear-gradient(135deg, #F0E2BE 0%, #D4B97F 38%, #B8965A 100%);\n  }\n\n  /* every slide is a full dark canvas */\n  .s {\n    width: 1920px; height: 1080px; position: relative; overflow: hidden;\n    background: var(--c-night);\n    font-family: 'Schibsted Grotesk', system-ui, sans-serif;\n    color: var(--c-cream);\n  }\n  .s.cream { background: var(--c-cream); color: var(--c-ink); }\n\n  /* shared vignette / texture */\n  .vignette { position: absolute; inset: 0; pointer-events: none;\n    background: radial-gradient(120% 95% at 50% 40%, rgba(20,26,38,.65) 0%, rgba(8,11,20,0) 55%),\n                radial-gradient(140% 120% at 50% 120%, rgba(0,0,0,.6) 0%, transparent 60%); }\n  .grain { position:absolute; inset:0; pointer-events:none; opacity:.05;\n    background-image: url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxMjAnIGhlaWdodD0nMTIwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC44NScgbnVtT2N0YXZlcz0nMicvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPScxMjAnIGhlaWdodD0nMTIwJyBmaWx0ZXI9J3VybCgjbiknLz48L3N2Zz4=\"); }\n
